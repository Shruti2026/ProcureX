server:
  port: 8080

spring:
  application:
    name: procurex-api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service-auth
              uri: lb://procurex-identity-service
              predicates:
                - Path=/api/v1/auth/**
            - id: identity-service-admin
              uri: lb://procurex-identity-service
              predicates:
                - Path=/api/v1/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
